# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline – Build, push to Artifact Registry, deploy to Cloud Run
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID  – your GCP project id (e.g. my-project-123456)
#   GCP_REGION      – deployment region (e.g. europe-west1)
#   GCP_SERVICE_KEY – base64-encoded JSON key of a GCP service account
#                     with roles: Artifact Registry Writer, Cloud Run Admin,
#                     Service Account User
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - '**'

env:
  # Artifact Registry repository name (created automatically if it doesn't exist
  # when you run `gcloud artifacts repositories create`)
  AR_REPO: yolov8-api
  # Cloud Run service name
  SERVICE_NAME: yolov8-api

jobs:
  build-and-deploy:
    name: Build Docker image and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ───────────────────────────────────────────────────────────────────────
      # 1. Check out the repository
      # ───────────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ───────────────────────────────────────────────────────────────────────
      # 2. Authenticate with Google Cloud using a service account JSON key
      # ───────────────────────────────────────────────────────────────────────
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_KEY }}

      # ───────────────────────────────────────────────────────────────────────
      # 3. Configure Docker to push to Artifact Registry
      # ───────────────────────────────────────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # ───────────────────────────────────────────────────────────────────────
      # 4. Build and push the Docker image
      #    Tag: <region>-docker.pkg.dev/<project>/<repo>/<service>:latest
      #    Also tag with the short commit SHA for traceability
      # ───────────────────────────────────────────────────────────────────────
      - name: Build and push Docker image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}"
          docker build \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${{ github.sha }}" \
            .
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      # ───────────────────────────────────────────────────────────────────────
      # 5. Deploy to Cloud Run
      # ───────────────────────────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE}" \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --memory 2Gi \
            --timeout 300 \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      # ───────────────────────────────────────────────────────────────────────
      # 6. Print the public service URL
      # ───────────────────────────────────────────────────────────────────────
      - name: Print Cloud Run service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)"
